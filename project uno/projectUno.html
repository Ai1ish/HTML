<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Design Demo</title>

    <style>
      /* RESET */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f4f4;
        color: #333;
      }

      /* HEADER */
      header {
        background: #333;
        color: white;
        padding: 1rem;
        text-align: center;
      }

      /* NAVBAR */
      nav {
        display: flex;
        justify-content: center;
        background: #555;
        flex-wrap: wrap;
      }

      nav a {
        color: white;
        padding: 1rem;
        text-decoration: none;
      }

      nav a:hover {
        background: #777;
      }

      /* MAIN LAYOUT */
      .container {
        display: grid;
        grid-template-columns: 3fr 1fr;
        gap: 1rem;
        padding: 1rem;
      }

      .main {
        background: white;
        padding: 1rem;
      }

      .sidebar {
        background: #ddd;
        padding: 1rem;
      }

      /* CARDS SECTION */
      .cards {
        display: flex;
        gap: 1rem;
        margin-top: 1rem;
      }

      .card {
        flex: 1;
        background: #eee;
        padding: 1rem;
        text-align: center;
      }

      /* TABLET VIEW */
      @media (max-width: 768px) {
        .container {
          grid-template-columns: 1fr;
        }

        .cards {
          flex-direction: column;
        }
      }

      /* MOBILE VIEW */
      @media (max-width: 480px) {
        nav {
          flex-direction: column;
          align-items: center;
        }

        nav a {
          width: 100%;
          text-align: center;
        }
      }

      /* FOOTER */
      footer {
        text-align: center;
        padding: 1rem;
        background: #333;
        color: white;
        margin-top: 1rem;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Responsive Web Design</h1>
      <p>Resize your browser to see changes :)</p>
    </header>

    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </nav>

    <div class="container">
      <div class="main">
        <h2>Main Content</h2>
        <p>This section adjusts based on screen size.</p>

        <div class="cards">
          <div class="card">Card 1</div>
          <div class="card">Card 2</div>
          <div class="card">Card 3</div>
        </div>
      </div>

      <div class="sidebar">
        <h3>Sidebar</h3>
        <p>This moves below the main content on smaller screens.</p>
      </div>
    </div>

    <footer>
      <p>Responsive Design Example @Arritsu</p>
    </footer>
  </body>
</html>
